services:
  db:
    image: postgres:16-alpine
    container_name: tradein-db
    environment:
      POSTGRES_USER: tradein
      POSTGRES_PASSWORD: tradein
      POSTGRES_DB: tradein
    ports:
      - "5433:5432"
    volumes:
      - tradein_pg:/var/lib/postgresql/data
      - ./supabase/migrations/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql:ro

volumes:
  tradein_pg:
