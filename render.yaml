# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy: connect this repo in Render Dashboard → New → Blueprint
services:
  - type: web
    name: resparts-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ADMIN_EMAILS
        sync: false
